name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: backend
            image_name: lila-xoxo-backend
            context: .
            dockerfile: ./Dockerfile
            build_args: ""
          - service_name: frontend
            image_name: lila-xoxo-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            build_args: |
              VITE_NAKAMA_HOST=${{ vars.VITE_NAKAMA_HOST || '127.0.0.1' }}
              VITE_NAKAMA_PORT=${{ vars.VITE_NAKAMA_PORT || '7350' }}
              VITE_NAKAMA_KEY=${{ vars.VITE_NAKAMA_KEY || 'defaultkey' }}
              VITE_NAKAMA_SSL=${{ vars.VITE_NAKAMA_SSL || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image namespace
        id: repo
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
